<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JAI × HOMA — Watchlist</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Monoton&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0418;
      --bg-2: #1a0826;
      --ink: #f3e8cd;
      --ink-dim: #c9bd9f;
      --accent1: #ff3ea5;
      --accent2: #5beaff;
      --accent3: #ffb347;
      --paper: #f3e8cd;
      --paper-shade: #e8dab6;
      --ink-dark: #1d0c0c;
    }
    .palette-acid {
      --bg: #091420; --bg-2: #0e1d31; --ink: #e9ffa8; --ink-dim: #bdd273;
      --accent1: #b6ff3a; --accent2: #ffe83a; --accent3: #37e8c8;
      --paper: #e9ffa8; --paper-shade: #cfe98a; --ink-dark: #0a1410;
    }
    .palette-sunset {
      --bg: #1c0716; --bg-2: #2c0d23; --ink: #ffd9b8; --ink-dim: #d4ad8a;
      --accent1: #ff4d8d; --accent2: #ff9942; --accent3: #ffe96b;
      --paper: #ffd9b8; --paper-shade: #f3c194; --ink-dark: #1a0708;
    }
    .palette-cobalt {
      --bg: #03061a; --bg-2: #070d2b; --ink: #d8e2ff; --ink-dim: #a3b0d6;
      --accent1: #4d8bff; --accent2: #a4f0ff; --accent3: #f0b0ff;
      --paper: #d8e2ff; --paper-shade: #b9c6ed; --ink-dark: #070b22;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Mono', ui-monospace, Menlo, monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 50% 0%, color-mix(in oklch, var(--accent1) 18%, transparent) 0%, transparent 55%),
        radial-gradient(ellipse at 100% 100%, color-mix(in oklch, var(--accent2) 12%, transparent) 0%, transparent 55%),
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.55) 100%);
    }
    body[data-scanlines="true"]::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 50;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.045) 0 1px, transparent 1px 3px);
      mix-blend-mode: overlay;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 1180px; margin: 0 auto; padding: 48px 32px 64px;
    }

    /* ── Sleeve ── */
    .sleeve {
      background: var(--paper);
      color: var(--ink-dark);
      border-radius: 6px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,.4),
        0 30px 60px -20px rgba(0,0,0,.7),
        0 2px 0 rgba(255,255,255,.15) inset;
      overflow: hidden;
      position: relative;
    }
    .sleeve::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background:
        repeating-linear-gradient(45deg, rgba(0,0,0,.018) 0 2px, transparent 2px 4px),
        repeating-linear-gradient(-45deg, rgba(0,0,0,.012) 0 3px, transparent 3px 6px);
    }
    .tape-band {
      height: 46px; position: relative;
      background: linear-gradient(180deg, #4a2410 0%, #2a1208 30%, #1a0a06 50%, #2a1208 70%, #4a2410 100%);
    }
    .tape-band::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, rgba(0,0,0,.55) 0 2px, transparent 2px 9px);
      mix-blend-mode: multiply;
    }
    .tape-band::after {
      content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 6px; transform: translateY(-50%);
      background: linear-gradient(90deg, transparent 0%, rgba(255,200,120,.15) 50%, transparent 100%);
    }

    .sleeve-body {
      display: grid; grid-template-columns: 1fr 320px; gap: 36px;
      padding: 34px 36px 30px;
      position: relative;
    }

    .label-club {
      font-family: 'VT323', monospace; font-size: 22px; letter-spacing: .18em;
      color: var(--ink-dark); opacity: .7; margin-bottom: 6px;
    }
    .marquee {
      font-family: 'Monoton', cursive;
      font-size: clamp(64px, 11vw, 140px);
      line-height: .85;
      margin: 0; letter-spacing: .01em;
      color: var(--ink-dark);
      text-shadow: -3px 0 0 var(--accent1), 3px 0 0 var(--accent2);
      position: relative;
    }
    .marquee small {
      display: block; font-size: .22em; letter-spacing: .5em;
      text-shadow: none; color: var(--ink-dark); opacity: .55;
      margin-top: 14px; font-family: 'VT323', monospace;
    }
    .strip {
      display: flex; gap: 14px; align-items: center; margin-top: 18px; flex-wrap: wrap;
      font-family: 'VT323', monospace; font-size: 18px; color: var(--ink-dark);
    }
    .strip span { display: inline-flex; align-items: center; gap: 8px; }
    .dot {
      width: 10px; height: 10px; border-radius: 999px; background: #c63; display: inline-block;
      box-shadow: 0 0 8px currentColor; color: #c63;
    }
    .dot.live { background: #d33; color: #d33; animation: blink 1.4s steps(2) infinite; }
    @keyframes blink { 50% { opacity: .25; } }
    .strip i { font-style: normal; opacity: .45; }

    .right-col {
      display: flex; flex-direction: column; gap: 18px; align-items: flex-end; justify-content: space-between;
    }
    .member {
      width: 100%;
      background: var(--ink-dark); color: var(--paper);
      border-radius: 6px;
      padding: 14px 16px;
      font-family: 'VT323', monospace; font-size: 19px; line-height: 1.25;
      box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--paper) 20%, transparent);
      position: relative; overflow: hidden;
    }
    .member::before {
      content: ''; position: absolute; left: 0; right: 0; top: 0; height: 24px;
      background: linear-gradient(90deg, var(--accent1) 0 33%, var(--accent2) 33% 66%, var(--accent3) 66% 100%);
    }
    .member-inner { padding-top: 24px; display: grid; grid-template-columns: 1fr auto; gap: 6px 14px; }
    .member-inner b { color: var(--accent2); font-weight: 400; letter-spacing: .06em; }
    .member-inner span:nth-child(even) { text-align: right; color: var(--paper); }
    .barcode {
      height: 42px; margin-top: 10px;
      background: repeating-linear-gradient(90deg, var(--paper) 0 2px, transparent 2px 4px, var(--paper) 4px 5px, transparent 5px 9px, var(--paper) 9px 12px, transparent 12px 14px);
      opacity: .95;
    }
    .barcode-num {
      font-family: 'VT323', monospace; font-size: 14px; letter-spacing: .3em; text-align: center;
      color: var(--paper); opacity: .75; margin-top: 4px;
    }

    .sticker {
      position: absolute; top: -22px; right: -16px;
      transform: rotate(8deg);
      background: var(--accent1); color: #1a0708;
      font-family: 'Bungee', sans-serif; font-size: 13px; letter-spacing: .05em;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 0 3px var(--paper), 4px 6px 0 rgba(0,0,0,.45);
      z-index: 3;
      line-height: 1;
      text-align: center;
    }
    .sticker .sm { display: block; font-size: 9px; margin-top: 4px; letter-spacing: .18em; }
    body[data-sticker="false"] .sticker { display: none; }

    .perf {
      height: 14px;
      background: radial-gradient(circle at 7px 7px, var(--bg) 0 4px, transparent 4.5px);
      background-size: 14px 14px; background-position: 0 0;
      background-repeat: repeat-x;
    }

    /* ── Sections ── */
    .section { margin-top: 48px; }
    .section-head {
      display: flex; align-items: flex-end; gap: 18px; margin-bottom: 16px;
      padding-bottom: 14px; border-bottom: 2px solid color-mix(in oklch, var(--ink) 25%, transparent);
    }
    .side-badge {
      font-family: 'Bungee', sans-serif; font-size: 14px; letter-spacing: .1em;
      background: var(--accent2); color: var(--ink-dark);
      padding: 6px 12px; border-radius: 3px;
      box-shadow: 3px 3px 0 rgba(0,0,0,.4);
      flex-shrink: 0;
    }
    .side-b .side-badge { background: var(--accent3); }
    .section-head h2 {
      font-family: 'Monoton', cursive; font-size: 48px; line-height: 1; margin: 0;
      color: var(--ink); letter-spacing: .02em;
      text-shadow: -1.5px 0 var(--accent1), 1.5px 0 var(--accent2);
      flex: 1;
    }
    .section-meta {
      font-family: 'VT323', monospace; font-size: 20px; color: var(--ink-dim);
      letter-spacing: .08em; text-align: right;
    }
    .section-meta b { color: var(--accent2); font-weight: 400; }

    /* ── List ── */
    .list {
      background: color-mix(in oklch, var(--bg-2) 80%, transparent);
      border: 1px solid color-mix(in oklch, var(--ink) 18%, transparent);
      border-radius: 8px;
      overflow: hidden;
    }
    .list-head, .row {
      display: grid;
      grid-template-columns: 44px 1fr 84px 110px 132px 124px 30px;
      align-items: center;
      gap: 0;
      padding: 0 8px 0 4px;
    }
    .list-head {
      background: color-mix(in oklch, var(--ink) 8%, transparent);
      color: var(--ink-dim);
      font-family: 'VT323', monospace; font-size: 16px; letter-spacing: .16em;
      text-transform: uppercase;
      height: 38px;
      border-bottom: 1px solid color-mix(in oklch, var(--ink) 18%, transparent);
    }
    .list-head > div { padding: 0 10px; }
    .list-head .num { text-align: center; }
    .row {
      border-bottom: 1px dashed color-mix(in oklch, var(--ink) 14%, transparent);
      min-height: 54px;
      transition: background .15s;
    }
    .row:hover { background: color-mix(in oklch, var(--accent1) 6%, transparent); }
    .row:last-child { border-bottom: none; }

    .row .num {
      font-family: 'VT323', monospace; font-size: 18px; color: var(--ink-dim);
      text-align: center; letter-spacing: .05em;
    }
    .row .title-input {
      appearance: none; background: transparent; border: 0; outline: 0;
      font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700;
      color: var(--ink); padding: 0 10px; width: 100%; letter-spacing: .01em;
    }
    .row .title-input::placeholder { color: color-mix(in oklch, var(--ink) 30%, transparent); font-weight: 400; font-style: italic; }
    .row .year-input {
      appearance: none; background: transparent; border: 0; outline: 0;
      font-family: 'VT323', monospace; font-size: 20px; color: var(--accent2);
      padding: 0 10px; width: 100%; letter-spacing: .08em;
    }
    .row .year-input::placeholder { color: color-mix(in oklch, var(--accent2) 35%, transparent); }

    .who-cell { padding: 0 10px; display: flex; gap: 6px; justify-content: flex-start; }
    .who-btn {
      appearance: none; border: 1.5px solid color-mix(in oklch, var(--ink) 22%, transparent);
      background: transparent; color: var(--ink-dim);
      font-family: 'Bungee', sans-serif; font-size: 13px;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .12s; padding: 0;
    }
    .who-btn:hover { border-color: var(--ink); }
    .who-btn.active.j { background: var(--accent1); color: var(--ink-dark); border-color: var(--accent1); box-shadow: 0 0 14px color-mix(in oklch, var(--accent1) 60%, transparent); }
    .who-btn.active.h { background: var(--accent2); color: var(--ink-dark); border-color: var(--accent2); box-shadow: 0 0 14px color-mix(in oklch, var(--accent2) 60%, transparent); }

    .hype-cell { padding: 0 10px; display: flex; gap: 5px; align-items: center; }
    .hype-dot {
      appearance: none; border: 0; background: transparent; padding: 0; cursor: pointer;
      width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center;
      font-family: 'VT323', monospace; font-size: 22px; line-height: 1;
      color: color-mix(in oklch, var(--ink) 25%, transparent);
      transition: transform .1s, color .15s;
    }
    .hype-dot.on { color: var(--accent3); text-shadow: 0 0 8px var(--accent3); }
    .hype-dot:hover { transform: scale(1.25); }

    .watch-cell { padding: 0 10px; display: flex; align-items: center; gap: 10px; }
    .check {
      appearance: none; border: 1.5px solid var(--ink-dim); background: transparent;
      width: 22px; height: 22px; border-radius: 3px; cursor: pointer;
      display: inline-grid; place-items: center; flex-shrink: 0; padding: 0;
      transition: all .12s;
    }
    .check:hover { border-color: var(--accent2); }
    .check.on { background: var(--accent2); border-color: var(--accent2); box-shadow: 0 0 12px color-mix(in oklch, var(--accent2) 60%, transparent); }
    .check.on::after { content: '✔'; font-family: 'Space Mono', monospace; font-weight: 700; color: var(--ink-dark); font-size: 14px; line-height: 1; }
    .stamp {
      font-family: 'VT323', monospace; font-size: 15px; letter-spacing: .1em;
      color: var(--ink-dim);
      white-space: nowrap;
    }
    .stamp.on { color: var(--accent2); }

    .del {
      appearance: none; border: 0; background: transparent;
      color: color-mix(in oklch, var(--ink) 25%, transparent);
      cursor: pointer; font-size: 18px; font-family: 'Space Mono', monospace;
      width: 24px; height: 24px; border-radius: 4px; padding: 0;
      display: inline-grid; place-items: center;
      opacity: 0; transition: opacity .12s, color .12s;
    }
    .row:hover .del { opacity: 1; }
    .del:hover { color: var(--accent1); }

    .side-b .row .title-input { color: var(--ink-dim); text-decoration: line-through; text-decoration-color: color-mix(in oklch, var(--ink) 35%, transparent); text-decoration-thickness: 1px; }
    .side-b .row .title-input:focus { text-decoration: none; color: var(--ink); }

    .add-row {
      margin-top: 14px;
      appearance: none; background: transparent;
      border: 1.5px dashed color-mix(in oklch, var(--ink) 28%, transparent);
      color: var(--ink-dim);
      font-family: 'Bungee', sans-serif; font-size: 13px; letter-spacing: .08em;
      padding: 12px 18px; border-radius: 6px; cursor: pointer;
      transition: all .15s;
    }
    .add-row:hover { border-color: var(--accent1); color: var(--accent1); }

    /* ── Footer / toolbar ── */
    .footer {
      margin-top: 64px; padding-top: 24px;
      border-top: 2px solid color-mix(in oklch, var(--ink) 20%, transparent);
      display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;
      font-family: 'VT323', monospace; font-size: 18px; color: var(--ink-dim); letter-spacing: .1em;
    }
    .footer .ll { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
    .footer .ok {
      background: var(--accent2); color: var(--ink-dark); padding: 2px 10px; border-radius: 3px;
      font-family: 'Bungee', sans-serif; font-size: 11px; letter-spacing: .1em;
    }

    .toolbar {
      display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 18px; align-items: center;
    }
    .sync-pill {
      margin-right: auto;
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'VT323', monospace; font-size: 16px; letter-spacing: .18em;
      color: var(--ink-dim);
      padding: 6px 12px; border-radius: 999px;
      background: color-mix(in oklch, var(--ink) 6%, transparent);
      border: 1px solid color-mix(in oklch, var(--ink) 15%, transparent);
    }
    .sync-led {
      width: 8px; height: 8px; border-radius: 50%; background: currentColor;
      box-shadow: 0 0 8px currentColor;
    }
    .sync-live        { color: var(--accent2); }
    .sync-saving      { color: var(--accent3); }
    .sync-saving .sync-led      { animation: blink 0.6s steps(2) infinite; }
    .sync-connecting  { color: var(--ink-dim); }
    .sync-connecting .sync-led  { animation: blink 1s steps(2) infinite; }
    .sync-offline     { color: var(--accent1); }
    .sync-hint {
      font-family: 'VT323', monospace; font-size: 15px; letter-spacing: .06em;
      color: var(--accent1);
      max-width: 520px; line-height: 1.25;
    }
    .tbtn {
      appearance: none; background: transparent;
      border: 1.5px solid color-mix(in oklch, var(--ink) 28%, transparent);
      color: var(--ink);
      font-family: 'Bungee', sans-serif; font-size: 11px; letter-spacing: .08em;
      padding: 8px 14px; border-radius: 4px; cursor: pointer;
      transition: all .15s;
    }
    .tbtn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Responsive ── */
    @media (max-width: 880px) {
      .sleeve-body { grid-template-columns: 1fr; gap: 24px; }
      .right-col { align-items: stretch; }
      .list-head, .row { grid-template-columns: 32px 1fr 64px 28px; }
      .list-head .col-who, .list-head .col-hype, .list-head .col-watch,
      .row .who-cell, .row .hype-cell, .row .watch-cell { display: none; }
      .marquee { font-size: 80px; }
    }

    /* ── Print ── */
    @media print {
      body { background: #fff; color: #111; }
      body::before, body::after { display: none; }
      .page { max-width: none; padding: 24px; }
      .sleeve { box-shadow: none; border: 1px solid #222; }
      .marquee, .section-head h2 { text-shadow: none; color: #111; }
      .row { break-inside: avoid; }
      .toolbar, .add-row, .del, .twk-panel, .sync-pill { display: none !important; }
      .row:hover { background: transparent; }
      .row .title-input, .row .year-input { color: #111; }
      .stamp { color: #333; }
      .side-b .row .title-input { color: #666; }
    }
  </style>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

}

              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (

      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

        </span>
      </div>
      <div className="list">
        <ListHead />
        {movies.length === 0 ? (
          <div className="row" style={{ color: "var(--ink-dim)", fontStyle: "italic", padding: "18px 14px", gridTemplateColumns: "1fr" }}>
            — no entries —
          </div>
        ) : (
          movies.map((m, i) => (
            <Row key={m.id} m={m} index={i} update={(p) => update(m.id, p)} remove={remove} />
          ))
        )}
      </div>
      {add && (
        <button className="add-row" onClick={add}>+ ADD TITLE</button>
      )}
    </section>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [movies, setMovies] = React.useState(null);
  const [sync, setSync]     = React.useState("connecting");
  const [room, setRoom]     = React.useState("");
  const [errMsg, setErrMsg] = React.useState("");

  const lastRemoteRef  = React.useRef(null);  // tracks the last array received from Firestore
  const fbRef          = React.useRef(null);
  const saveTimer      = React.useRef(null);
  const syncRef        = React.useRef("connecting");
  const isTypingRef    = React.useRef(false);
  const typingTimer    = React.useRef(null);
  React.useEffect(() => { syncRef.current = sync; }, [sync]);

  React.useEffect(() => {
    let unsub = null;
    let cancelled = false;

    const offlineFallback = setTimeout(() => {
      if (cancelled) return;
      setMovies((m) => m === null ? seedList() : m);
      setSync((s) => s === "live" || s === "saving" ? s : "offline");
    }, 6000);

    whenFbReady().then((fb) => {
      if (cancelled) return;
      fbRef.current = fb;
      setRoom(fb.ROOM);
      unsub = fb.onSnapshot(
        (snap) => {
          if (cancelled) return;
          clearTimeout(offlineFallback);
          if (snap.exists() && Array.isArray(snap.data().movies)) {
            lastRemoteRef.current = snap.data().movies;
            if (!isTypingRef.current){
              setMovies(snap.data().movies);
            }
          } else if (!snap.exists()) {
            // Genuinely new document — seed it for the first time
            const seed = seedList();
            lastRemoteRef.current = seed;
            setMovies(seed);
            fb.setDoc({ movies: seed }).catch((err) => {
              console.error("[firestore write]", err);
              setSync("offline");
              setErrMsg(err.code === "permission-denied"
                ? "Rules not published — see console.firebase.google.com → Firestore → Rules"
                : err.message);
            });
          } else {
            // Document exists but data is unexpected — do NOT overwrite
            console.error("[firestore] unexpected data format, not overwriting:", snap.data());
            setSync("offline");
            setErrMsg("Unexpected data format in Firestore — not overwriting");
            return;
          }
          setSync("live");
          setErrMsg("");
        },
        (err) => {
          console.error("[firestore read]", err);
          if (cancelled) return;
          clearTimeout(offlineFallback);
          setMovies((m) => m === null ? seedList() : m);
          setSync("offline");
          setErrMsg(err.code === "permission-denied"
            ? "Rules not published — see console.firebase.google.com → Firestore → Rules"
            : err.message);
        }
      );
    });

    return () => {
      cancelled = true;
      clearTimeout(offlineFallback);
      if (unsub) unsub();
    };
  }, []);

  React.useEffect(() => {
    if (movies === null) return;                    // not loaded yet
    if (JSON.stringify(movies) === JSON.stringify(lastRemoteRef.current)) return;   // change came FROM Firestore
    if (!fbRef.current) return;
    if (syncRef.current === "offline") return;
    setSync("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fbRef.current.setDoc({ movies })
        .then(() => { setSync("live"); setErrMsg(""); })
        .catch((err) => {
          console.error(err);
          setSync("offline");
          setErrMsg(err.code === "permission-denied"
            ? "Rules not published — see console.firebase.google.com → Firestore → Rules"
            : err.message);
        });
    }, 500);
  }, [movies, sync]);

  const update = React.useCallback((id, patch) => {
  isTypingRef.current = true;
  clearTimeout(typingTimer.current);
  typingTimer.current = setTimeout(() => {
    isTypingRef.current = false;
  }, 2000);
  setMovies((ms) => ms.map((m) => (m.id === id ? { ...m, ...patch } : m)));
}, []);
  const remove = React.useCallback((id) => {
    setMovies((ms) => ms.filter((m) => m.id !== id));
  }, []);
  const add = React.useCallback(() => {
    setMovies((ms) => [...ms, makeBlank()]);
  }, []);
  const clearAll = () => {
    if (confirm("Wipe the whole shared list? This affects both of you.")) {
      const fresh = seedList();
      setMovies(fresh);
    }
  };

  if (movies === null) {
    return (
      <div className="page">
        <div style={{
          minHeight: "70vh", display: "grid", placeItems: "center",
          fontFamily: "'VT323',monospace", fontSize: 28, letterSpacing: ".25em",
          color: "var(--ink-dim)"
        }}>
          <div style={{ textAlign: "center" }}>
            <div className="dot live" style={{ display: "inline-block", marginRight: 12 }}></div>
            CUEING TAPE…
          </div>
        </div>
      </div>
    );
  }

  const toWatch = movies.filter((m) => !m.watched);
  const watched = movies.filter((m) => m.watched);

  return (
    <div className={"page palette-" + t.palette}>
      <div className="sleeve">
        <div className="tape-band" />
        <div className="sleeve-body">
          <div className="left-col">
            <div className="label-club">⌬ JAI × HOMA VIDEO CLUB ⌬</div>
            <h1 className="marquee">
              WATCH<br/>LIST
              <small>VOL.01 · NOT FOR RESALE</small>
            </h1>
            <div className="strip">
              <span><i className="dot live"></i> REC</span>
              <i>//</i>
              <span>NTSC</span>
              <i>//</i>
              <span>SP · 120 MIN</span>
              <i>//</i>
              <span>EST. {new Date().getFullYear()}</span>
            </div>
          </div>
          <div className="right-col">
            <div className="sticker">BE KIND<span className="sm">REWIND</span></div>
            <div className="member">
              <div className="member-inner">
                <span><b>MEMBER</b></span><span>#001</span>
                <span><b>NAME</b></span><span>JAI &amp; HOMA</span>
                <span><b>STATUS</b></span><span>ACTIVE</span>
                <span><b>RENTALS</b></span><span>∞</span>
              </div>
              <div className="barcode" />
              <div className="barcode-num">0 1 9 8 4 · {today.replace(/\./g," ")}</div>
            </div>
          </div>
        </div>
        <div className="perf" />
      </div>

      <div className="toolbar" style={{ marginTop: 28 }}>
        <span className={"sync-pill sync-" + sync} title={"Room: " + (room || "—")}>
          <i className="sync-led" />
          {sync === "live"        && "SYNCED"}
          {sync === "saving"      && "SAVING…"}
          {sync === "connecting"  && "CONNECTING…"}
          {sync === "offline"     && "OFFLINE"}
        </span>
        {sync === "offline" && errMsg && (
          <span className="sync-hint">{errMsg}</span>
        )}
        <button className="tbtn" onClick={() => window.print()}>⎙ PRINT / EXPORT</button>
        <button className="tbtn" onClick={clearAll}>⟲ RESET</button>
      </div>

      <Section
        title="TO WATCH"
        badge="A · SIDE"
        side="a"
        movies={toWatch}
        update={update}
        remove={remove}
        add={add}
      />

      <Section
        title="WATCHED"
        badge="B · SIDE"
        side="b"
        movies={watched}
        update={update}
        remove={remove}
        add={null}
      />

      <footer className="footer">
        <div className="ll">
          <span className="ok">OK</span>
          <span>© JAI × HOMA VIDEO CLUB</span>
          <i style={{opacity:.4}}>//</i>
          <span>PLEASE REWIND</span>
        </div>
        <div>LATE FEES APPLY · CH 03 · {today}</div>
      </footer>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Look" />
        <TweakRadio
          label="Palette"
          value={t.palette}
          options={[
            { value: "neon",   label: "Neon" },
            { value: "acid",   label: "Acid" },
            { value: "sunset", label: "Sunset" },
            { value: "cobalt", label: "Cobalt" }
          ]}
          onChange={(v) => setTweak("palette", v)}
        />
        <TweakToggle
          label="Scanlines"
          value={t.scanlines}
          onChange={(v) => {
            setTweak("scanlines", v);
            document.body.dataset.scanlines = String(v);
          }}
        />
        <TweakToggle
          label="Rewind sticker"
          value={t.sticker}
          onChange={(v) => {
            setTweak("sticker", v);
            document.body.dataset.sticker = String(v);
          }}
        />
      </TweaksPanel>
    </div>
  );
}

(() => {
  document.body.dataset.scanlines = String(TWEAK_DEFAULTS.scanlines);
  document.body.dataset.sticker   = String(TWEAK_DEFAULTS.sticker);
})();

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
